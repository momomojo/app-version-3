<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" integrity="sha512-BNaRQnYJYiPSqHHDb58B0yaPfCu+Wgds8Gp/gU33kqBtgNS4tSPHuGibyoeqMV/TJlSKda6FXzoEyYGjTe+vXA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <title>Clinical Neurology Self-Assessment</title>
    <style>
        .hidden { display: none !important; }
        /* --- Light Mode Styles (Default) --- */
        body {
            font-family: sans-serif;
            margin: 0; /* Remove default margin */
            padding: 0; /* Remove default padding */
            background-color: #f4f4f4;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: stretch; /* Stretch .app-container vertically */
            min-height: 100vh;
        }

        .app-container { 
            width: 100%; 
            max-width: none; 
            background-color: #fff;
            border: none; /* Remove border if it interferes with 100% height */
            box-shadow: none; /* Remove shadow if it interferes */
            display: flex;
            flex-direction: column;
            height: 100vh; /* Explicitly set to viewport height */
        }

        header {
            background-color: #003366; /* Dark blue/navy color */
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9em;
            border-bottom: 1px solid #ddd;
            flex-wrap: wrap; /* Allow header items to wrap */
        }

        .exam-info {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
        }

        .exam-info span {
            margin-right: 15px;
            margin-bottom: 5px; /* Add margin for wrapping */
        }

        .question-controls {
            display: flex;
            align-items: center;
             margin-bottom: 5px; /* Add margin for wrapping */
        }

        #mark-question {
            margin-right: 5px;
        }

        main {
            padding: 20px;
            height: 100%; /* Re-apply: Constrain height within wrapper */
            display: flex; /* Make main a flex container */
            flex-direction: column; /* Stack children vertically */
            align-items: flex-start; /* Align children to the left */
            transition: width 0.3s ease;
            overflow-y: auto; /* Keep scrolling for main content */
        }

        #options-list {
            list-style: none;
            padding: 0; /* Remove default ul/ol padding */
            margin: 0; /* Remove default ul/ol margin */
            margin-bottom: 0; /* Reset any potential list margin */
            width: 100%; /* Make list span full width */
        }

        #options-list.multi-column {
             column-count: 2; /* Arrange options in two columns */
             column-gap: 20px; /* Space between columns */
        }

        .option {
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid #eee;
            border-radius: 4px;
            cursor: pointer;
            background-color: #f9f9f9;
            transition: background-color 0.2s ease;
            display: flex;
            align-items: flex-start; /* Align option text to the top */
            width: 100%; /* Make option span full width */
            box-sizing: border-box; /* Include padding in width calculation */
            break-inside: avoid-column; /* Prevent options breaking across columns */
        }

        .option:last-child {
            margin-bottom: 50px; /* Add extra space after the last option */
        }

        .option:hover {
            background-color: #e9e9e9;
        }

        .option.selected {
            background-color: #cce0ff; /* Light blue for selected */
            border-color: #99c2ff;
        }

        .option.crossed-out .option-text {
            text-decoration: line-through;
            color: #888; /* Gray out text */
        }

         /* Simple highlighting style (visual only) */
        ::selection {
            background-color: yellow;
        }

        ::-moz-selection { /* Firefox specific */
            background-color: yellow;
        }

        /* Style for the radio button label (to make it click-friendly) */
        .option .option-text {
            flex-grow: 1; /* Takes up space to be clickable */
        }

        .option input[type="radio"] {
            flex-shrink: 0; /* Prevent shrinking */
        }

        footer {
            background-color: #e9e9e9; /* Add background to distinguish */
            border-top: 1px solid #ccc; /* Add border to distinguish */
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9em;
            flex-wrap: wrap; /* Allow buttons to wrap on smaller screens */
        }

        footer button {
            background-color: #f9f9f9;
            color: #333;
            border: 1px solid #ccc;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 3px;
            margin: 5px; /* Add some space between buttons */
            transition: background-color 0.2s ease;
        }

        footer button:hover {
            background-color: #e9e9e9;
        }

        .footer-link {
            margin: 5px; /* Add space around the link */
            color: white;
             flex-grow: 1; /* Allow link to take up space */
             text-align: center; /* Center the link */
             min-width: 150px; /* Prevent link from collapsing too much */
        }

         #dark-mode-toggle {
            background-color: #f9f9f9;
            color: #333;
            border: 1px solid #ccc;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 3px;
            margin: 5px;
             font-size: 0.9em; /* Match header/footer text size */
            transition: background-color 0.2s ease;
        }

        #dark-mode-toggle:hover {
            background-color: #e9e9e9;
        }


        /* Report styles */
        #report-container {
            padding: 20px;
            max-height: 95vh; /* Limit height of report for scrolling */
            margin-bottom: 20px;
        }

        #report-container h2 {
            text-align: center;
            color: #003366;
            margin-bottom: 20px;
        }

        #report-container h3 {
             text-align: center;
             color: #006633; /* Dark green for score */
             margin-top: 0;
             margin-bottom: 20px;
        }


        .report-question {
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid #eee; /* Add border to separate questions in report */
            border-radius: 5px;
            background-color: #fdfdfd; /* Slightly different background */
        }

        .report-question-text {
            font-weight: bold;
            margin-bottom: 10px;
        }

         .report-user-answer, .report-correct-answer {
             margin-top: 5px;
             padding-left: 10px; /* Indent answers */
         }

        .report-user-answer {
            font-style: italic;
        }

        .report-correct-answer {
            font-weight: bold;
            color: green;
        }

        .report-explanation {
            margin-top: 15px; /* More space above explanation */
            border-left: 4px solid #003366;
            padding-left: 15px; /* More padding */
            background-color: #eef;
            white-space: pre-wrap; /* Preserve line breaks in explanation */
            word-wrap: break-word; /* Wrap long words */
        }

        .report-explanation strong {
            color: #003366;
        }

        .incorrect-answer {
            color: red;
        }

        .correct-answer {
            color: green;
        }


        footer button:disabled, #dark-mode-toggle:disabled, #mark-question:disabled, label[for="mark-question"] {
            opacity: 0.5;
            cursor: not-allowed;
        }


        @media (max-width: 600px) {
            header, footer {
                flex-direction: column;
                align-items: flex-start;
            }
            .exam-info span, .question-controls, .footer-link, footer button {
                margin-bottom: 5px;
                margin-right: 0;
            }
             .footer-link {
                 text-align: left;
             }
        }

        /* --- Dark Mode Styles --- */
        body.dark-mode {
            background-color: #1a1a1a;
            color: #e0e0e0;
        }

        body.dark-mode .app-container,
        body.dark-mode #report-container {
            background-color: #2b2b2b;
            border-color: #444;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        body.dark-mode header,
        body.dark-mode footer {
            background-color: #121212; /* Even darker */
            color: #f0f0f0;
            border-color: #444;
        }

        body.dark-mode .exam-info span,
        body.dark-mode .footer-link {
            color: #f0f0f0;
        }

        body.dark-mode .question-text {
             color: #f0f0f0;
        }

        body.dark-mode .option {
            background-color: #3a3a3a;
            border-color: #555;
            color: #cccccc;
        }

        body.dark-mode .option:hover {
            background-color: #4a4a4a;
        }

        body.dark-mode .option.selected {
            background-color: #405d80; /* Darker blue selection */
            border-color: #6080a0;
            color: #f0f0f0; /* White text on dark blue */
        }

        body.dark-mode .option.crossed-out .option-text {
            color: #666; /* Gray out text */
        }

         body.dark-mode ::selection {
             background-color: #6080a0; /* A blue that stands out on dark */
             color: white;
         }

         body.dark-mode ::-moz-selection { /* Firefox specific */
             background-color: #6080a0;
             color: white;
         }


        body.dark-mode footer button,
         body.dark-mode #dark-mode-toggle {
            background-color: #4a4a4a;
            color: #e0e0e0;
            border: 1px solid #666;
        }

        body.dark-mode footer button:hover,
         body.dark-mode #dark-mode-toggle:hover {
            background-color: #5a5a5a;
        }

        /* Report specific dark mode styles */
        body.dark-mode #report-container h2 {
            color: #6080a0; /* Lighter blue for headings */
        }

        body.dark-mode #report-container h3 {
             color: #66cc66; /* A green that works on dark background */
        }

        body.dark-mode .report-question {
            background-color: #333;
            border-color: #555;
        }

         body.dark-mode .report-correct-answer {
            color: rgb(50, 205, 50); /* Bright green for correct answers */
        }
        
        /* Report Buttons at Top Styling */
        .report-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .report-buttons button {
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            background-color: var(--primary-color, #003366);
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        
        .report-buttons button:hover {
            background-color: var(--primary-color-darker, #002244);
        }
        
        /* Dark mode button styles */
        body.dark-mode .report-buttons button {
            background-color: #405d80;
            color: #f0f0f0;
        }
        
        body.dark-mode .report-buttons button:hover {
            background-color: #4a6e9a;
        }

         body.dark-mode .report-user-answer.incorrect-answer {
             color: #ff6666; /* A red that works on dark background */
         }

        body.dark-mode .report-correct-answer {
            color: #66cc66; /* A green that works on dark background */
        }

        body.dark-mode .report-explanation {
            background-color: #3a4a5a; /* Darker blue background for explanation */
            border-left-color: #6080a0; /* Accent border */
            color: #cccccc; /* Light gray text */
        }

        body.dark-mode .report-explanation strong {
            color: #f0f0f0; /* Lighter color for bold text */
        }

        body.dark-mode #restart-button {
             background-color: #008040; /* Green button for dark mode */
             color: white;
        }

        body.dark-mode #restart-button:hover {
             background-color: #006633;
        }


        @media (max-width: 600px) {
            header, footer {
                flex-direction: column;
                align-items: flex-start;
            }
            .exam-info span, .question-controls, .footer-link, footer button {
                margin-bottom: 5px;
                margin-right: 0;
            }
             .footer-link {
                 text-align: left;
             }
        }
        
        /* New Split Panel Styles */
        .main-wrapper {
            display: flex;
            flex: 1; /* Explicitly define flex behavior (grow, shrink, basis) */
            overflow: hidden; /* Prevent content spilling out */
            position: relative; /* Establish positioning context if needed */
        }

        .main-wrapper main {
            width: 100%;
            height: 100%; /* Re-apply: Constrain height within wrapper */
            transition: width 0.3s ease;
            overflow-y: auto; /* Keep scrolling for main content */
        }

        #lab-values-panel {
            width: 0;
            height: 100%; /* Re-apply: Constrain height within wrapper */
            overflow: hidden; /* Hide overflow when panel is closed/width is 0 */
            transition: width 0.3s ease;
            border-left: 1px solid #ccc;
            background-color: #f8f8f8;
            display: flex; /* Use flex for panel content */
            flex-direction: column;
        }

        .main-wrapper.lab-panel-active main {
            width: 60%; /* Adjust as needed */
        }

        .main-wrapper.lab-panel-active #lab-values-panel {
            width: 40%; /* Adjust as needed */
            overflow-y: auto; /* Allow panel content to scroll ONLY when active */
        }

        .panel-content { /* Renamed from modal-content */
            flex-grow: 1; /* Allow content to take available space */
            display: flex;
            flex-direction: column;
            position: relative; /* For close button positioning */
            padding: 20px; /* Apply padding here */
        }

        #close-lab-panel { /* Renamed from close-button */
            position: absolute;
            top: 5px;
            right: 10px;
            font-size: 24px;
            font-weight: bold;
            color: #888;
            cursor: pointer;
            line-height: 1;
            background: none;
            border: none;
            padding: 0;
        }

        #close-lab-panel:hover {
            color: #333;
        }

        .tab-container {
            display: flex;
            flex-direction: column;
        }

        .tab-buttons button {
            background-color: #f1f1f1;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 10px 15px;
            transition: 0.3s;
            border-radius: 5px 5px 0 0; /* Rounded top corners */
            margin-right: 2px;
        }

        .tab-buttons button:hover {
            background-color: #ddd;
        }

        .tab-buttons button.active {
            background-color: #ccc;
        }

        .tab-content {
            display: none; /* Hide content by default */
            padding: 15px;
            border: 1px solid #ccc;
            border-top: none;
            border-radius: 0 0 5px 5px; /* Rounded bottom corners */
        }

        .tab-content.active {
            display: block; /* Show active tab content */
        }

        /* Lab Values Table Style */
        .lab-values-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .lab-values-table th, .lab-values-table td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        .lab-values-table th {
            background-color: #f2f2f2;
        }

        .panel-content h2 {
            margin-top: 0; /* Remove default top margin if any */
            margin-bottom: 15px; /* Space below the title */
        }

        /* Dark mode adjustments for panel */
        body.dark-mode .main-wrapper #lab-values-panel {
            background-color: #444;
            border-color: #666;
        }
        body.dark-mode .panel-content {
            background-color: #505050;
        }
        body.dark-mode .tab-buttons button {
            background-color: #555;
            color: #f0f0f0;
            border-color: #777;
        }
        body.dark-mode .tab-buttons button:hover {
            background-color: #666;
        }
        body.dark-mode .tab-buttons button.active {
            background-color: #777;
        }
        body.dark-mode .tab-content {
            border-color: #666;
        }
        body.dark-mode .lab-values-table th,
        body.dark-mode .lab-values-table td {
            border-color: #777;
        }
        body.dark-mode .lab-values-table th {
            background-color: #606060;
        }

        .question-text {
            margin-bottom: 15px;
            font-size: 1.1em; /* Restore font size */
            line-height: 1.6; /* Restore line spacing */
        }

        .question-image {
            text-align: center; /* Restore image centering */
            margin-bottom: 15px; /* Restore space below image */
        }

        .question-image img {
            max-width: 100%; /* Restore image responsiveness */
            height: auto;
        }
        /* --- Review Modal Styles --- */
        .modal { /* General modal styles */
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6); /* Semi-transparent overlay */
            z-index: 1050; /* Ensure it's above other elements */
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .modal.hidden {
            display: none;
        }
        
        .modal-content { /* General modal content box */
            background-color: #fff; /* Light mode background */
            padding: 25px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            position: relative;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
        }
        
        .review-content { /* Specific styles for review modal */
            width: 90%;
            max-width: 550px; /* Adjust width as needed */
        }
        
        .review-content h2 {
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.4em;
            color: #333; /* Light mode text */
        }
        
        .review-filter {
            margin-bottom: 20px;
            text-align: center;
            border-bottom: 1px solid #eee; /* Light mode border */
            padding-bottom: 15px;
        }
        
        .review-filter label {
            margin: 0 12px;
            cursor: pointer;
            color: #555; /* Light mode text */
        }
        .review-filter input[type="radio"] {
            margin-right: 5px;
        }
        
        
        #review-list {
            list-style: none;
            padding: 0;
            margin: 0;
            overflow-y: auto; /* Allow scrolling */
            flex-grow: 1; /* Take remaining vertical space */
            border: 1px solid #eee; /* Light mode border */
            border-radius: 4px;
        }
        
        #review-list li {
            padding: 10px 15px;
            border-bottom: 1px solid #eee; /* Light mode border */
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background-color 0.2s ease;
            color: #333; /* Light mode text */
        }
        
        #review-list li:hover {
            background-color: #f5f5f5; /* Light hover */
        }
        
        #review-list li:last-child {
            border-bottom: none;
        }
        
        .status {
            display: inline-block;
            padding: 4px 9px;
            border-radius: 12px; /* Pill shape */
            font-size: 0.8em;
            font-weight: 500;
            margin-left: 8px;
            border: 1px solid transparent;
        }
        
        .status-answered {
            background-color: #e7f4e8;
            color: #28a745; /* Green */
            border-color: #c3e6cb;
        }
        
        .status-unanswered {
            background-color: #f8d7da;
            color: #dc3545; /* Red */
            border-color: #f5c6cb;
        }
        
        .status-marked {
            background-color: #fff3cd;
            color: #ffc107; /* Yellow/Orange */
            border-color: #ffeeba;
            margin-left: 5px;
        }
        
        /* Dark mode for Review Modal */
        body.dark-mode .modal-content {
            background-color: #2b2b2b; /* Dark background */
            border-color: #555;
        }
        body.dark-mode .review-content h2,
        body.dark-mode .review-filter label,

            color: #ddd; /* Dark mode text */

        body.dark-mode #review-list {

        body.dark-mode #review-list li {

        body.dark-mode #close-review-modal:hover {

        /* Basic styling for start screen */
        #start-screen {
            position: fixed; /* Cover the whole page */
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--background-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            justify-content: center;

        }
        #start-button:hover {
             background-color: var(--primary-color-darker);
        }

        /* Print-specific styles */
        @media print {
            /* Hide everything by default */
            body * {
                visibility: hidden;
            }

            /* Show only the report container and its contents */
            #report-container, #report-container * {
                visibility: visible;

                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                margin: 0;
                padding: 10px; /* Add some padding */
                border: none; /* Remove borders if any */
            }

            /* Hide the action buttons within the report container */
            #report-actions, #download-report-pdf, #restart-button {
                display: none !important; /* Ensure buttons are hidden */
            }

            /* Try to prevent questions from breaking across pages */
            .report-question {
                page-break-inside: avoid;
                margin-bottom: 15px; /* Add space between questions */
            }
            
            /* Ensure images don't overflow */
            .question-image img {
                 max-width: 100%;
                 height: auto;
            }
        }

            background-color: yellow;
            cursor: pointer; /* Indicate clickability for unhighlighting */
        }

            background-color: #777; /* Muted gray for dark mode highlight */

        .panel-content { /* Renamed from modal-content */

        #close-lab-panel { /* Renamed from close-button */

        /* Lab Values Table Style */

        /* Dark mode adjustments for panel */
        body.dark-mode .main-wrapper #lab-values-panel {
            background-color: #444;

        }
        body.dark-mode .panel-content {

        .question-text {

        .question-image {

        .question-image img {

        /* --- Review Modal Styles --- */
        .modal { /* General modal styles */
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6); /* Semi-transparent overlay */

        .modal.hidden {

        .modal-content { /* General modal content box */

            padding: 25px;
            border: 1px solid #ccc;

            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);

        .review-content { /* Specific styles for review modal */

        .review-content h2 {

        #review-list {

        }

        }
        body.dark-mode .status-answered {
            background-color: #2a573b;
            color: #9fddb3;
            border-color: #3a704c;
        }
        body.dark-mode .status-unanswered {
            background-color: #5a2a2f;

        /* Close button style */
        #close-review-modal {
            position: absolute;
            top: 10px;

            font-size: 28px;
            font-weight: bold;
            color: #aaa; /* Light mode */
            cursor: pointer;
            line-height: 1;
        }

        }

            color: #888; /* Dark mode */
        }
        body.dark-mode #close-review-modal:hover {
            color: #ddd; /* Dark mode */
        }
        
        /* Basic styling for start screen */
        #start-screen {
            position: fixed; /* Cover the whole page */
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--background-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 100; /* Ensure it's on top */

        }
        #start-screen h1 {
            margin-bottom: 30px;

        #start-button {
            padding: 15px 30px;
            font-size: 1.2em;

            background-color: var(--primary-color);
            color: white;
            border: none;

            transition: background-color 0.3s ease;

             background-color: var(--primary-color-darker);

        /* Print-specific styles */
        @media print {
            /* Hide everything by default */
            body * {
                visibility: hidden;
            }

            /* Show only the report container and its contents */
            #report-container, #report-container * {
                visibility: visible;
            }

            /* Position the report container at the top of the page */
            #report-container {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                margin: 0;
                padding: 10px; /* Add some padding */
                border: none; /* Remove borders if any */
            }

            /* Hide the action buttons within the report container */
            #report-actions, #download-report-pdf, #restart-button {
                display: none !important; /* Ensure buttons are hidden */
            }

            /* Try to prevent questions from breaking across pages */
            .report-question {
                page-break-inside: avoid;
                margin-bottom: 15px; /* Add space between questions */
            }
            
            /* Ensure images don't overflow */
            .question-image img {
                 max-width: 100%;
                 height: auto;
            }
        }
        
        .strikethrough-answer {
            text-decoration: line-through;
            color: grey;
            cursor: pointer; /* Indicate it's clickable */
        }
    </style>
</head>
<body>
    <div id="start-screen">
        <h1>Welcome to the Exam</h1>
        <p>Click the button below to begin.</p>
        <button id="start-button">Begin Exam</button>
    </div>
    <div class="app-container">
        <header class="hidden">
            <div class="exam-info">
                <span id="exam-section-item">Exam Section : Item 1 of 150</span>
                <span id="exam-title">National Board of Medical Examiners Clinical Neurology Self-Assessment</span>
                <span id="time-remaining">Time Remaining: 3 hr 45 min 00 sec</span>
            </div>
            <div class="question-controls">
                 <button id="dark-mode-toggle">Dark Mode</button> <!-- Dark Mode Toggle -->
                <input type="checkbox" id="mark-question">
                <label for="mark-question">Mark</label>
            </div>
        </header>

        <div class="main-wrapper hidden">
            <main id="question-area">
                <!-- Question and options will be loaded here by JavaScript -->
                 Loading questions...
            </main>
            <div id="lab-values-panel">
                <div class="panel-content">
                    <button class="close-button" id="close-lab-panel">×</button>
                    <h2>Laboratory Values</h2>
                    <div class="tab-container">
                        <div class="tab-buttons" id="lab-tab-buttons"></div>
                        <div class="tab-content-area" id="lab-tab-content-area"></div>
                    </div>
                </div>
            </div>
        </div>

        <footer class="hidden">
            <button id="prev-button" disabled>Previous</button>
            <button id="next-button" disabled>Next</button>
            <span class="footer-link">https://t.me/USMLENBME2CK</span>
            <button id="lab-values-button" disabled>Lab Values</button>
            <button id="calculator-button" disabled>Calculator</button>
            <button id="review-button" disabled>Review</button>
            <button id="help-button" disabled>Help</button>
            <button id="pause-button" disabled>Pause</button>
        </footer>
    </div>

    <div id="report-container" class="hidden">
        <h2>Exam Report</h2>
        <div class="report-buttons">
            <button id="download-report-pdf">Download Report (PDF)</button>
            <button id="restart-button">Restart Exam</button>
        </div>
        <div id="report-content">
            <!-- Report will be loaded here by JavaScript -->
        </div>
    </div>

    <script>
        // Declare questions globally, will be populated after fetching JSON
        let questions = [];

        // --- State Variables ---
        let currentQuestionIndex = 0;
        let userAnswers = []; // Will be initialized after questions are loaded
        let markedQuestions = []; // Will be initialized after questions are loaded
        let crossedOutOptions = []; // Will be initialized after questions are loaded
        let userAnnotations = []; // Stores { questionIndex: { strikethroughs: ['A', 'B', ...] } }

        // --- Timer Variables ---
        let timerInterval = null;
        const totalExamSeconds = 150 * 90; // 150 questions * 90 seconds/question
        let timeRemainingSeconds = totalExamSeconds;
        let isTimerPaused = false;

        // --- DOM Elements ---
        const examContainer = document.querySelector('.app-container');
        const reportContainer = document.getElementById('report-container');
        const questionArea = document.getElementById('question-area');
        const examSectionItemSpan = document.getElementById('exam-section-item');
        const timeRemainingSpan = document.getElementById('time-remaining');
        const markCheckbox = document.getElementById('mark-question');
        const prevButton = document.getElementById('prev-button');
        const nextButton = document.getElementById('next-button');
        const pauseButton = document.getElementById('pause-button');
        const reportContentDiv = document.getElementById('report-content');
        const restartButton = document.getElementById('restart-button');
        const darkModeToggle = document.getElementById('dark-mode-toggle');
        // Lab Values Modal Elements
        const mainWrapper = document.querySelector('.main-wrapper'); // Get the wrapper
        const labValuesPanel = document.getElementById('lab-values-panel'); // Get the panel
        const labTabButtons = document.getElementById('lab-tab-buttons');
        const labTabContentArea = document.getElementById('lab-tab-content-area');
        let labValuesData = null; // To store fetched lab values

        // --- Functions ---

        // Timer Functions
        function updateTimerDisplay() {
            const hours = Math.floor(timeRemainingSeconds / 3600);
            const minutes = Math.floor((timeRemainingSeconds % 3600) / 60);
            const seconds = timeRemainingSeconds % 60;
            timeRemainingSpan.textContent = `Time Remaining: ${hours} hr ${minutes.toString().padStart(2, '0')} min ${seconds.toString().padStart(2, '0')} sec`;

            if (timeRemainingSeconds <= 0) {
                endExam();
            }
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval); // Prevent multiple intervals
            timerInterval = setInterval(() => {
                if (!isTimerPaused) {
                    timeRemainingSeconds--;
                    if (timeRemainingSeconds < 0) timeRemainingSeconds = 0; // Prevent negative time
                    updateTimerDisplay();
                    if (timeRemainingSeconds <= 0) {
                        clearInterval(timerInterval);
                        endExam();
                    }
                }
            }, 1000);
        }

        function togglePause() {
            const pauseButton = document.getElementById('pause-button'); // Get button reference
            if (isTimerPaused) {
                // Resume
                startTimer(); // Restart interval
                isTimerPaused = false;
                pauseButton.textContent = 'Pause';
                pauseButton.classList.remove('paused'); // Optional: remove paused style
                console.log("Timer Resumed");
            } else {
                // Pause
                clearInterval(timerInterval); // Stop interval
                isTimerPaused = true;
                pauseButton.textContent = 'Resume';
                pauseButton.classList.add('paused'); // Optional: add paused style
                console.log("Timer Paused");
            }
        }

        // Question Loading
        async function loadQuestions() {
            const filePaths = [
                'questions and answers/Neuro-E-5.json',
                'questions and answers/Neuro-E-6.json',
                'questions and answers/Neuro-E-7.json'
            ];

            try {
                const responses = await Promise.all(filePaths.map(path => fetch(path)));
                const dataArrays = await Promise.all(responses.map(res => {
                    if (!res.ok) {
                        throw new Error(`Failed to load ${res.url}: ${res.statusText}`);
                    }
                    return res.json();
                }));

                // Combine questions from all files
                questions = [].concat(...dataArrays);

                // Initialize state based on loaded questions
                userAnswers = new Array(questions.length).fill(null);
                markedQuestions = new Array(questions.length).fill(false);
                crossedOutOptions = questions.map(() => new Set()); // Correctly initialize as array of Sets
                userAnnotations = questions.map(() => ({ strikethroughs: [] }));

                // Initial render and timer start
                renderQuestion(currentQuestionIndex);
                enableControls(); // Enable controls only after questions are loaded
                startTimer();
                setupReviewModalListeners(); // Set up review modal listeners AFTER controls are enabled

            } catch (error) {
                console.error('Error loading questions:', error);
                questionArea.innerHTML = `<p style="color: red;">Error loading questions. Please check the console or try refreshing.</p>`;
                disableControls(); // Keep controls disabled on error
                if (darkModeToggle) darkModeToggle.disabled = false; // Keep dark mode toggle enabled
            }
        }

        function enableControls() {
             prevButton.disabled = false;
             nextButton.disabled = false;
             pauseButton.disabled = false;
             markCheckbox.disabled = false;
             darkModeToggle.disabled = false;
             // Utility buttons
             document.getElementById('lab-values-button').disabled = false;
             document.getElementById('calculator-button').disabled = false;
             document.getElementById('review-button').disabled = false;
             document.getElementById('help-button').disabled = false;
        }

        function disableControls() {
             prevButton.disabled = true;
             nextButton.disabled = true;
             pauseButton.disabled = true;
             markCheckbox.disabled = true;
             darkModeToggle.disabled = true;
             // Utility buttons
             document.getElementById('lab-values-button').disabled = true;
             document.getElementById('calculator-button').disabled = true;
             document.getElementById('review-button').disabled = true;
             document.getElementById('help-button').disabled = true;
        }


        // Question Rendering
        function renderQuestion(index) {
            if (index < 0 || index >= questions.length) return;

            const question = questions[index];
            questionArea.innerHTML = `
                <div class="question-text">
                    ${question.id}. ${formatText(question.text)}
                </div>
                ${question.image ? `<div class="question-image"><img src="questions and answers/${question.image}" alt="Question image for item ${question.id}"></div>` : ''}
                <ul id="options-list">
                    ${Object.keys(question.options).map(optionLetter => {
                        const optionText = question.options[optionLetter];
                        const isSelected = userAnswers[index] === optionLetter;
                        const isCrossedOut = crossedOutOptions[index].has(optionLetter);
                        const selectedClass = isSelected ? 'selected' : '';
                        const crossedOutClass = isCrossedOut ? 'crossed-out' : '';

                        return `
                            <li class="option ${selectedClass} ${crossedOutClass}" data-option="${optionLetter}" data-question-index="${index}">
                                <input type="radio" name="q${question.id}" value="${optionLetter}" ${isSelected ? 'checked' : ''}>
                                <span class="option-text">${optionLetter}) ${optionText}</span>
                            </li>
                        `;
                    }).join('')}
                </ul>
            `;

            const optionsListElement = questionArea.querySelector('#options-list'); 

            // Update header info
            examSectionItemSpan.textContent = `Exam Section : Item ${index + 1} of ${questions.length}`;
            markCheckbox.checked = markedQuestions[index];

            // Update navigation button states
            prevButton.disabled = index === 0;
            nextButton.textContent = index === questions.length - 1 ? 'Submit Exam' : 'Next';

            // Add event listeners to the new options
            questionArea.querySelectorAll('.option').forEach(optionElement => {
                optionElement.addEventListener('click', handleOptionClick);
                optionElement.addEventListener('contextmenu', handleOptionRightClick); // Right-click for crossing out
            });

            // Apply multi-column class if options list overflows
            requestAnimationFrame(() => { 
                if (optionsListElement && optionsListElement.scrollHeight > optionsListElement.clientHeight) {
                    optionsListElement.classList.add('multi-column');
                } else if (optionsListElement) {
                    optionsListElement.classList.remove('multi-column');
                }
            });

            // Add the new mouseup listener for highlighting
            const questionTextElement = questionArea.querySelector('.question-text');
            if (questionTextElement) {
                 // Ensure listener is only added once if re-rendering
                 questionTextElement.removeEventListener('mouseup', handleHighlightSelection); 
                 questionTextElement.addEventListener('mouseup', handleHighlightSelection);
            }
        }

        // Event Handlers
        function handleOptionClick(event) {
            const clickedOption = event.currentTarget;
            const questionIndex = parseInt(clickedOption.dataset.questionIndex);
            const optionLetter = clickedOption.dataset.option;

            // If this option is already crossed out, do nothing on click
            if (crossedOutOptions[questionIndex].has(optionLetter)) {
                return;
            }

            // Deselect previous selection for this question
            questionArea.querySelectorAll('.option').forEach(opt => {
                // Only deselect options for the current question
                if (parseInt(opt.dataset.questionIndex) === questionIndex) {
                    opt.classList.remove('selected');
                    opt.querySelector('input[type="radio"]').checked = false;
                }
            });

            // Select the clicked option
            clickedOption.classList.add('selected');
            clickedOption.querySelector('input[type="radio"]').checked = true;
            userAnswers[questionIndex] = optionLetter;
        }

        function handleOptionRightClick(event) {
            event.preventDefault(); // Prevent default context menu

            const clickedOption = event.currentTarget;
            const questionIndex = parseInt(clickedOption.dataset.questionIndex);
            const optionLetter = clickedOption.dataset.option;

            const isCurrentlySelected = clickedOption.classList.contains('selected');

            // If the option is currently selected, deselect it before crossing out
            if (isCurrentlySelected) {
                clickedOption.classList.remove('selected');
                clickedOption.querySelector('input[type="radio"]').checked = false;
                userAnswers[questionIndex] = null; // Clear the user's selection
            }

            // Toggle the crossed-out state
            clickedOption.classList.toggle('crossed-out');

            if (clickedOption.classList.contains('crossed-out')) {
                crossedOutOptions[questionIndex].add(optionLetter);
            } else {
                crossedOutOptions[questionIndex].delete(optionLetter);
            }
        }

        function handleNavigationClick(direction) {
            if (direction === 'next') {
                if (currentQuestionIndex < questions.length - 1) {
                    currentQuestionIndex++;
                } else {
                     // End of test, show report
                    endExam();
                    return; // Don't render next question
                }
            } else if (direction === 'prev') {
                if (currentQuestionIndex > 0) {
                    currentQuestionIndex--;
                }
            }
            renderQuestion(currentQuestionIndex);
             // Scroll to the top of the question area on navigation
            questionArea.scrollTo(0, 0);
        }

        function handleMarkCheckboxChange() {
            markedQuestions[currentQuestionIndex] = markCheckbox.checked;
            // Optional: provide visual feedback elsewhere (e.g., in a review list)
        }

        // Dark Mode Functions
        function enableDarkMode() {
            document.body.classList.add('dark-mode');
            darkModeToggle.textContent = 'Light Mode';
            localStorage.setItem('theme', 'dark');
        }

        function disableDarkMode() {
            document.body.classList.remove('dark-mode');
            darkModeToggle.textContent = 'Dark Mode';
            localStorage.setItem('theme', 'light');
        }

        function toggleDarkMode() {
            console.log('toggleDarkMode function called'); // <-- Add log for debugging
            if (document.body.classList.contains('dark-mode')) {
                disableDarkMode();
            } else {
                enableDarkMode();
            }
        }

        function applySavedTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                enableDarkMode();
            } else if (savedTheme === 'light') {
                disableDarkMode();
            } else {
                // Check system preference if no theme is saved
                if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    enableDarkMode();
                } else {
                     disableDarkMode(); // Default to light mode
                }
            }
        }


        // Report Generation
        function generateReport() {
            let correctCount = 0;
            let reportHtml = '';

            questions.forEach((question, index) => {
                const userAnswer = userAnswers[index];
                const correctAnswer = question.correctAnswer;
                const isCorrect = userAnswer === correctAnswer;

                if (isCorrect) {
                    correctCount++;
                }

                reportHtml += `
                    <div class="report-question">
                        <div class="report-question-text">${question.id}. ${formatText(question.text)}</div>

        // --- Lab Values Functionality ---
        async function fetchLabValues() {
            if (labValuesData) return; // Already fetched
            try {
                const response = await fetch('lab-values.json');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                labValuesData = await response.json();
            } catch (error) {

                // Optionally display an error to the user
            }

        function renderLabValuesTabs() {
            console.log("renderLabValuesTabs: Function start");
            if (!labValuesData || !Array.isArray(labValuesData)) {
                console.error("Lab values data is missing or not an array.");
                labTabButtons.innerHTML = '<p>Error loading lab values.</p>';
                labTabContentArea.innerHTML = '';
                return;
            }

            labTabButtons.innerHTML = ''; // Clear existing tabs
            labTabContentArea.innerHTML = ''; // Clear existing content

            // --- Define Tab Structure and Data Collection --- 
            const tabDefinitions = {
                "Serum": { keys: ["SERUM", "Lipids", "Iron Studies", "Endocrine", "Immunoglobulins", "GASES, ARTERIAL BLOOD (ROOM AIR)"], items: [] },
                "Blood": { keys: ["HEMATOLOGIC", "Coagulation"], items: [] },
                "Cerebrospinal": { keys: ["CEREBROSPINAL FLUID"], items: [] },
                "Urine & BMI": { keys: ["URINE", "BODY MASS INDEX (BMI)"], items: [] }
            };

            // Iterate through the raw JSON data and distribute items to the correct tab definition
            labValuesData.forEach(sectionObject => {
                const mainKey = Object.keys(sectionObject)[0];
                if (!mainKey) return;
                const sectionData = sectionObject[mainKey];

                // Find which tab this mainKey belongs to
                let targetTabName = null;
                for (const tabName in tabDefinitions) {
                    if (tabDefinitions[tabName].keys.includes(mainKey)) {
                        targetTabName = tabName;
                        break;
                    }
                }

                if (targetTabName) {
                    const targetItems = tabDefinitions[targetTabName].items;

                    if (Array.isArray(sectionData)) { // Direct list of tests (e.g., Lipids, CSF, Coagulation)
                        targetItems.push(...sectionData);
                    } else if (typeof sectionData === 'object' && sectionData !== null) {
                        if (mainKey === "BODY MASS INDEX (BMI)") { // Special handling for BMI
                            if (sectionData.test) {
                                targetItems.push({
                                    test: `BMI (${sectionData.test})`, // Include 'Adult'
                                    referenceRange: sectionData.referenceRange || '',
                                    siReferenceIntervals: sectionData.siReferenceIntervals || ''
                                });
                            }
                        } else { 
                             // Object with sub-categories (e.g., SERUM, HEMATOLOGIC)
                            for (const subCategoryKey in sectionData) {
                                if (Array.isArray(sectionData[subCategoryKey])) {
                                    // Add items, maybe prefix test name with subCategoryKey if needed for context?
                                    // Example shows flattening, so we just add items directly.
                                     targetItems.push(...sectionData[subCategoryKey]);
                                }
                            }
                        }
                    } 
                }
            });

            console.log("renderLabValuesTabs: Data collection complete. tabDefinitions:", JSON.parse(JSON.stringify(tabDefinitions))); // Log a deep copy

            // --- Create Tabs and Content --- 
            let isFirstTab = true;
            for (const tabName in tabDefinitions) {
                console.log(`renderLabValuesTabs: Creating tab for '${tabName}'`);
                const tabId = tabName.replace(/\s*&\s*/g, '-').replace(/\s+/g, '-'); // Create a safe ID
                createTabAndContent(tabId, tabName, tabDefinitions[tabName].items, isFirstTab);
                if (isFirstTab) isFirstTab = false;
            }
        }

        // Helper function to create tab button and content pane
        function createTabAndContent(tabId, tabName, itemsArray, isFirst) {
            // Create Tab Button
            const tabButton = document.createElement('button');
            tabButton.textContent = tabName;
            tabButton.dataset.tabId = tabId;
            tabButton.addEventListener('click', handleTabClick);
            labTabButtons.appendChild(tabButton);

            // Create Tab Content Pane
            const tabContent = document.createElement('div');
            tabContent.id = `tab-${tabId}`;
            tabContent.classList.add('tab-content');
            // Generate a single table containing all items for this tab
            tabContent.innerHTML = createTableHTML(itemsArray);
            labTabContentArea.appendChild(tabContent);

            if (isFirst) {
                tabButton.classList.add('active');
                tabContent.classList.add('active');
            }
        }

        // Helper function to create the HTML for a single table from an array of test items
        function createTableHTML(itemsArray) {
            if (!itemsArray || itemsArray.length === 0) return '<p>No data available for this section.</p>';

            // Use headers based on examples (Reference Range, SI Units optional?)
            // Examples seem to only show one range column labeled "Reference Range"
            let tableHTML = '<table class="lab-values-table"><thead><tr><th>Test</th><th>Reference Range</th></tr></thead><tbody>'; 
            
            itemsArray.forEach(item => {
                if (!item || !item.test) return; // Skip null/undefined items or items without a test name
                
                let testName = item.test;
                let displayRange = ''; // Column to display the formatted range

                 // --- Handle complex nested structures --- 
                if (item.subTests && Array.isArray(item.subTests)) {
                    // Render subTests as indented items under the main test
                    tableHTML += `<tr><td style="font-weight: bold;">${testName}</td><td></td></tr>`; // Main test row 
                    item.subTests.forEach(subTest => {
                         displayRange = (subTest.referenceRange || '').replace(/\n/g, '<br>');
                         // Optionally include SI units if needed: displayRange += `<br><i>SI: ${(subTest.siReferenceIntervals || '').replace(/\n/g, '<br>')}</i>`;
                         tableHTML += `<tr><td style="padding-left: 20px;">${subTest.test || ''}</td><td>${displayRange}</td></tr>`;
                    });
                    return; // Skip default row rendering below
                } else if (item.subRanges && Array.isArray(item.subRanges)) {
                    displayRange = item.subRanges.map(sr => `${sr.type || ''}: ${sr.referenceRange || ''}`).join('<br>');
                } else if (item.genderRanges && typeof item.genderRanges === 'object') {
                    displayRange = Object.entries(item.genderRanges).map(([gender, range]) => `${gender}: ${range}`).join('<br>');
                } else if (item.ranges && Array.isArray(item.ranges)) { 
                    displayRange = item.ranges.map(r => `${r.type || ''}: ${r.referenceRange || ''}`).join('<br>');
                } else if (item.timepoints && Array.isArray(item.timepoints)) { 
                    displayRange = item.timepoints.map(tp => `${tp.time || ''}: ${tp.referenceRange || ''}`).join('<br>');
                } else {
                     // Default case: simple referenceRange
                     displayRange = (item.referenceRange || '').replace(/\n/g, '<br>');
                }
                
                // Optionally include SI units if needed and present
                // if (item.siReferenceIntervals) {
                //     displayRange += `<br><i>SI: ${item.siReferenceIntervals}</i>`;
                // }

                // --- End complex structure handling ---
                tableHTML += `<tr><td>${testName}</td><td>${displayRange}</td></tr>`;
            });
            tableHTML += '</tbody></table>';
            return tableHTML;
        }

        function handleTabClick(event) {
            const tabId = event.target.dataset.tabId;

            // Deactivate all tabs and content
            document.querySelectorAll('.tab-buttons button').forEach(button => button.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

            // Activate clicked tab and corresponding content
            event.target.classList.add('active');
            document.getElementById(`tab-${tabId}`).classList.add('active');
        }

        // Populates the review list based on the selected filter
        function populateReviewList(filter = 'all') { 
             // Re-check reviewList existence inside the function
             const listElement = document.getElementById('review-list');
             if (!listElement) {
                  console.error("Cannot populate: Review list element is null.");
                  return;
              }

             // Use currentReviewList instead of the potentially stale global/initApp variable
             listElement.innerHTML = ''; // Clear current list

             let filteredIndices = [];

             questions.forEach((q, index) => {
                const isAnswered = userAnswers[index] !== undefined && userAnswers[index] !== null;
                const isMarked = markedQuestions.includes(index);

                let shouldShow = false;
                switch (filter) {
                    case 'answered':
                        shouldShow = isAnswered;
                        break;
                    case 'unanswered':
                        shouldShow = !isAnswered;
                        break;
                    case 'marked':
                        shouldShow = isMarked;
                        break;
                    case 'all':
                    default:
                        shouldShow = true;
                        break;
                }

                if (shouldShow) {
                    const listItem = document.createElement('li');
                    listItem.dataset.questionIndex = index; // Store index to jump to

                    let statusText = isAnswered ? 'Answered' : 'Unanswered';
                    let statusClass = isAnswered ? 'status-answered' : 'status-unanswered';
                    let markedStatusHTML = isMarked ? '<span class="status status-marked">Marked</span>' : '';

                    listItem.innerHTML = `
                        Question ${index + 1}
                        <span style="white-space: nowrap;"> <!-- Prevent wrapping of statuses -->
                            <span class="status ${statusClass}">${statusText}</span>
                            ${markedStatusHTML}
                        </span>
                    `;

                    // Add click listener to jump to the question
                    listItem.addEventListener('click', () => {
                        console.log(`Review item clicked. Attempting to navigate to index: ${index}`); // Log 1
                        currentQuestionIndex = parseInt(index);
                        console.log(`Updated currentQuestionIndex to: ${currentQuestionIndex}`); // Log 2
                        console.log("Calling renderQuestion()..."); // Log 3
                        renderQuestion(currentQuestionIndex); // Correct function call
                        console.log("Calling closeReviewModal()..."); // Log 4
                        closeReviewModal();
                    });
                    listElement.appendChild(listItem);
                }
            });

            // Display a message if no questions match the filter
            if (listElement.children.length === 0) {
                listElement.innerHTML = '<li style="text-align: center; color: #888; padding: 20px; cursor: default;">No questions match this filter.</li>';
            }
        }

        // --- Highlighting Functionality ---
        function handleHighlightSelection(event) { // Changed from no arg to event
            console.log("handleHighlightSelection called"); // <-- Add Entry Log
            // Use event.currentTarget which IS the .question-text element the listener was attached to
            const questionTextElement = event.currentTarget;

            // The check below is no longer strictly needed as the listener IS on the element,
            // but we keep it as a safeguard in case the event bubbles unexpectedly.
             if (!event.target.closest('.question-text')) { // Check if the actual click target is inside
                 console.log("Highlight aborted: Target not within .question-text"); // <-- Add Log
                 return; // Exit if the click wasn't truly inside the text area
             }


            const selection = window.getSelection();
            // Exit if no selection or selection is empty (collapsed)
            if (!selection.rangeCount || selection.isCollapsed) { 
                console.log("Highlight aborted: No selection range or selection collapsed"); // <-- Add Log
                return; 
            }
        
            const range = selection.getRangeAt(0);
        
             // Prevent highlighting if selection is zero width (e.g., just a click)
            if (range.getBoundingClientRect().width === 0) {
                console.log("Highlight aborted: Zero-width selection"); // <-- Add Log
                selection.removeAllRanges(); // Clear the collapsed selection
                return;
            } 
            
            // *** Add null check for the common ancestor container ***
            if (!range.commonAncestorContainer) { 
                console.warn("Highlight aborted: Selection common ancestor is null."); // <-- Modified Log
                selection.removeAllRanges(); 
                return;
            }

            // *** Add check if it's a valid Node ***
            if (!(range.commonAncestorContainer instanceof Node)) {
                 console.warn("Highlight aborted: Selection common ancestor is not a valid Node:", range.commonAncestorContainer); // <-- Modified Log
                 selection.removeAllRanges();
                 return;
            }

            // Check if the valid common ancestor Node is within the target element (event.currentTarget)
            let isContained = false;
            try {
                // --- Wrap this check in try...catch ---
                isContained = questionTextElement.contains(range.commonAncestorContainer);
            } catch (error) {
                console.error("Error during .contains() check:", error); // Keep error logs
                console.error("questionTextElement:", questionTextElement);
                console.error("commonAncestorContainer:", range.commonAncestorContainer);
                selection.removeAllRanges(); // Attempt to clear selection on error
                console.log("Highlight aborted: Error during contains() check."); // <-- Add Log
                return; // Exit if check fails
            }

            if (!isContained) {
                console.log("Highlight aborted: Selection not contained within question text."); // <-- Add Log
                 selection.removeAllRanges(); // Clear selection if outside target area
                return;
            }
            
            // If all checks pass, apply the highlight
            console.log("Applying highlight..."); // <-- Add Log
            applyHighlight(range);
             // Selection is cleared within applyHighlight AFTER insertion
        }

        function applyHighlight(range) {
            // Create a span to wrap the selection
            const highlightSpan = document.createElement('span');
            highlightSpan.className = 'highlighted-text';
            
            // Add click listener to the span itself for removal
            highlightSpan.addEventListener('click', () => {
                 removeHighlight(highlightSpan);
            });

            try {
                // This might throw an error if the selection spans across
                // elements that cannot contain a span, or crosses boundaries
                // in complex ways. A more robust solution might involve iterating
                // through nodes in the range.
                range.surroundContents(highlightSpan);
                window.getSelection().removeAllRanges(); // Clear selection after highlighting
            } catch (e) {
                console.error("Highlighting error: ", e);
                // Optional: Provide feedback if highlighting fails
                // alert("Could not highlight the selection. It might span across incompatible elements.");
                // Attempt to clear selection even on error
                window.getSelection().removeAllRanges();
            }
        }
        
        function removeHighlight(spanElement) {
             const parent = spanElement.parentNode;
             if (!parent) return;

             // Move all child nodes of the span out before the span
             while (spanElement.firstChild) {
                  parent.insertBefore(spanElement.firstChild, spanElement);
             }
             // Remove the now-empty span
             parent.removeChild(spanElement);
             parent.normalize(); // Merges adjacent text nodes (optional but good practice)
        }

        function handleNavigationClick(direction) {
            if (direction === 'next') {
                if (currentQuestionIndex < questions.length - 1) {
                    currentQuestionIndex++;
                } else {
                     // End of test, show report
                    endExam();
                    return; // Don't render next question
                }
            } else if (direction === 'prev') {
                if (currentQuestionIndex > 0) {
                    currentQuestionIndex--;
                }
            }
            renderQuestion(currentQuestionIndex);
             // Scroll to the top of the question area on navigation
            questionArea.scrollTo(0, 0);
        }
